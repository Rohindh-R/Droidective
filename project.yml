name: Droidective
options:
  bundleIdPrefix: com.rohindh
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  ADBKit:
    path: ADBKit
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 1.10.0
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: 1.13.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.3
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 9.18.0
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: 3.61.0
targets:
  App:
    type: application
    platform: macOS
    sources:
      - App/Sources
      - App/Resources
    dependencies:
      - package: ADBKit
        product: ADBKit
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
      - package: SwiftTerm
        product: SwiftTerm
      - package: Sparkle
        product: Sparkle
      - package: Sentry
        product: Sentry
      - package: PostHog
        product: PostHog
    info:
      path: App/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: ""
        SentryDSN: $(SENTRY_DSN)
        PostHogKey: $(POSTHOG_KEY)
        SUFeedURL: https://rohindh-r.github.io/Droidective/appcast.xml
        SUPublicEDKey: "ma0kTe35r55/PKmemQOEBX7n6SuZPZjOBo973SdJqJ8="
        SUEnableAutomaticChecks: true
    settings:
      base:
        PRODUCT_NAME: Droidective
        PRODUCT_BUNDLE_IDENTIFIER: com.rohindh.droidective
        SENTRY_DSN: ""
        POSTHOG_KEY: ""
        MARKETING_VERSION: "2.4.0"
        CURRENT_PROJECT_VERSION: "2"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEAD_CODE_STRIPPING: YES
