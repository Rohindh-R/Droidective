name: Droidective
options:
  bundleIdPrefix: com.rohindh
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  ADBKit:
    path: ADBKit
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 1.10.0
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: 1.13.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.3
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 9.18.0
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: 3.61.0
targets:
  App:
    type: application
    platform: macOS
    sources:
      - App/Sources
      - path: App/Resources
        excludes:
          - scrcpy-server
          - ffmpeg
      # Extension-less binaries: force them into the resources phase so they land
      # in the .app bundle (XcodeGen otherwise can't infer the build phase).
      # scrcpy-server is pushed to the device; ffmpeg runs on the Mac for the
      # video editor. See BundledTools + scripts/update-bundled-tools.sh.
      - path: App/Resources/scrcpy-server
        buildPhase: resources
      - path: App/Resources/ffmpeg
        buildPhase: resources
    dependencies:
      - package: ADBKit
        product: ADBKit
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
      - package: SwiftTerm
        product: SwiftTerm
      - package: Sparkle
        product: Sparkle
      - package: Sentry
        product: Sentry
      - package: PostHog
        product: PostHog
    info:
      path: App/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: ""
        SentryDSN: $(SENTRY_DSN)
        PostHogKey: $(POSTHOG_KEY)
        SUFeedURL: https://droidective.github.io/Droidective/appcast.xml
        SUPublicEDKey: "ma0kTe35r55/PKmemQOEBX7n6SuZPZjOBo973SdJqJ8="
        SUEnableAutomaticChecks: true
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: com.android.package-archive
            UTTypeDescription: Android Package
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - apk
        CFBundleDocumentTypes:
          - CFBundleTypeName: Android Package
            CFBundleTypeRole: Viewer
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.android.package-archive
    settings:
      base:
        PRODUCT_NAME: Droidective
        PRODUCT_BUNDLE_IDENTIFIER: com.rohindh.droidective
        SENTRY_DSN: ""
        POSTHOG_KEY: ""
        MARKETING_VERSION: "2.5.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEAD_CODE_STRIPPING: YES
