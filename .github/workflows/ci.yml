name: CI
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
        with:
          persist-credentials: false
      - name: Run ADBKit tests
        run: cd ADBKit && swift test

  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
        with:
          persist-credentials: false
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Build app
        run: |
          xcodegen generate
          xcodebuild -project Droidective.xcodeproj -scheme App -configuration Debug -derivedDataPath DerivedData build CODE_SIGNING_ALLOWED=NO

  # Publish the marketing site to GitHub Pages on every push to main, preserving
  # the appcast the release job last published (so site edits don't wipe the
  # Sparkle update feed).
  pages:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
        with:
          persist-credentials: false
      - name: Assemble site (refresh appcast from the live feed when present)
        run: |
          mkdir -p _site
          cp -R site/. _site/
          # Prefer the live feed (kept fresh by releases); fall back to the
          # committed site/appcast.xml. Fetch to a temp file so a 404 never
          # truncates the committed copy.
          if curl -fsSL https://rohindh-r.github.io/Droidective/appcast.xml -o /tmp/appcast.xml; then
            cp /tmp/appcast.xml _site/appcast.xml
          fi
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, build]
    runs-on: macos-15
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
        with:
          persist-credentials: false
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "$DEVELOPER_ID_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -P "$DEVELOPER_ID_P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/cert.p12"
          security find-identity -v -p codesigning "$KEYCHAIN"
      - name: Build, sign, and notarize release DMG
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          NOTARY_KEY_BASE64: ${{ secrets.NOTARY_KEY_P8_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          xcodegen generate
          xcodebuild -project Droidective.xcodeproj -scheme App -configuration Release \
            -derivedDataPath DerivedData build CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="$VERSION" CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            SENTRY_DSN="$SENTRY_DSN" POSTHOG_KEY="$POSTHOG_KEY"
          echo "$NOTARY_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/notary.p8"
          export NOTARY_KEY_PATH="$RUNNER_TEMP/notary.p8"
          ./scripts/package-dmg.sh "${GITHUB_REF_NAME}"
          ./scripts/notarize-dmg.sh "DerivedData/Build/Products/Release/Droidective-${GITHUB_REF_NAME}.dmg"
          rm -f "$RUNNER_TEMP/notary.p8"
      - name: Extract notes for this release
        run: awk '/^## /{c++} c==1{print} c==2{exit}' RELEASE_NOTES.md > release-body.md
      - name: Publish release with build
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: DerivedData/Build/Products/Release/Droidective-*.dmg
          body_path: release-body.md
          fail_on_unmatched_files: true
      - name: Sign update and assemble site + appcast
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG="DerivedData/Build/Products/Release/Droidective-${GITHUB_REF_NAME}.dmg"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/Droidective-${GITHUB_REF_NAME}.dmg"
          ./scripts/fetch-sparkle-tools.sh
          mkdir -p _site
          cp -R site/. _site/
          ./scripts/update-appcast.sh "$DMG" "$VERSION" "${{ github.run_number }}" "${GITHUB_REF_NAME}" "$DOWNLOAD_URL" "_site/appcast.xml"
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
