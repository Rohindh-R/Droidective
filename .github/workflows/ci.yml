name: CI
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
        with:
          persist-credentials: false
      - name: Run ADBKit tests
        run: cd ADBKit && swift test

  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
        with:
          persist-credentials: false
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Build app
        run: |
          xcodegen generate
          xcodebuild -project Droidective.xcodeproj -scheme App -configuration Debug -derivedDataPath DerivedData build CODE_SIGNING_ALLOWED=NO

  # Publish the marketing site (and the committed Sparkle appcast) to GitHub
  # Pages on every push to main. The appcast in site/ is the single source of
  # truth — the release job commits each new version's entry back to main, which
  # re-triggers this job to deploy it.
  pages:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
        with:
          persist-credentials: false
      - name: Assemble site
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
        run: |
          mkdir -p _site
          cp -R site/. _site/
          # Reuse the app's PostHog key (a public client-side token) so the site
          # shares one project; analytics no-ops if the secret is unset. Every
          # page loads the shared analytics.js, so the key is injected once here.
          if [ -n "${POSTHOG_KEY:-}" ]; then
            sed -i "s|__POSTHOG_KEY__|${POSTHOG_KEY}|g" _site/analytics.js
          fi
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, build]
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8  # v5.0.0
        with:
          persist-credentials: false
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          echo "$DEVELOPER_ID_CERT_P12" | openssl base64 -d -A > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/cert.p12"
      - name: Build, sign, and package DMG
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          xcodegen generate
          xcodebuild -project Droidective.xcodeproj -scheme App -configuration Release \
            -derivedDataPath DerivedData build \
            MARKETING_VERSION="$VERSION" CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            SENTRY_DSN="$SENTRY_DSN" POSTHOG_KEY="$POSTHOG_KEY" \
            CODE_SIGN_IDENTITY="$SIGN_IDENTITY" DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual ENABLE_HARDENED_RUNTIME=YES OTHER_CODE_SIGN_FLAGS="--timestamp" \
            DEBUG_INFORMATION_FORMAT=dwarf-with-dsym
          SIGN_IDENTITY="$SIGN_IDENTITY" ./scripts/package-dmg.sh "${GITHUB_REF_NAME}"
      # Upload dSYMs so Sentry can symbolicate first-party frames in crash/app-hang
      # reports. Without this, our own frames show as <unknown>. Skips cleanly if
      # the SENTRY_AUTH_TOKEN secret is absent (e.g. forks).
      - name: Upload dSYMs to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ro-is
          SENTRY_PROJECT: droidective-mac
          SENTRY_URL: https://de.sentry.io
        run: |
          [[ -n "${SENTRY_AUTH_TOKEN:-}" ]] || { echo "no SENTRY_AUTH_TOKEN secret — skipping dSYM upload"; exit 0; }
          brew install getsentry/tools/sentry-cli
          sentry-cli debug-files upload --wait DerivedData/Build/Products/Release
      - name: Notarize and staple
        env:
          AC_API_KEY_P8: ${{ secrets.AC_API_KEY_P8 }}
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
        run: |
          echo "$AC_API_KEY_P8" | openssl base64 -d -A > "$RUNNER_TEMP/ac_api.p8"
          AC_API_KEY_PATH="$RUNNER_TEMP/ac_api.p8" \
          AC_API_KEY_ID="$AC_API_KEY_ID" \
          AC_API_ISSUER_ID="$AC_API_ISSUER_ID" \
            ./scripts/notarize.sh "DerivedData/Build/Products/Release/Droidective-${GITHUB_REF_NAME}.dmg"
          rm -f "$RUNNER_TEMP/ac_api.p8"
      - name: Extract notes for this release
        run: awk '/^## /{c++} c==1{print} c==2{exit}' RELEASE_NOTES.md > release-body.md
      - name: Publish release with build
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: DerivedData/Build/Products/Release/Droidective-*.dmg
          body_path: release-body.md
          fail_on_unmatched_files: true
      - name: Sign update and publish appcast to main
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          GH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG="DerivedData/Build/Products/Release/Droidective-${GITHUB_REF_NAME}.dmg"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/Droidective-${GITHUB_REF_NAME}.dmg"
          ./scripts/fetch-sparkle-tools.sh
          # release-body.md (the GitHub release notes, extracted above) is
          # rendered to HTML and embedded in the appcast's <description>.
          ./scripts/update-appcast.sh "$DMG" "$VERSION" "${{ github.run_number }}" "$DOWNLOAD_URL" release-body.md "site/appcast.xml"
          # Commit the regenerated appcast back to main; the resulting push runs
          # the pages job, which deploys it. (GitHub Pages only serves deploys
          # from the source branch, so a tag-ref deploy here would never go live.)
          ./scripts/commit-appcast.sh "site/appcast.xml" "${{ github.repository }}" main "${GITHUB_REF_NAME}"
      - name: Update Homebrew cask
        continue-on-error: true
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          [[ -n "${HOMEBREW_TAP_TOKEN:-}" ]] || { echo "no HOMEBREW_TAP_TOKEN — skipping cask update"; exit 0; }
          VERSION="${GITHUB_REF_NAME#v}"
          DMG="DerivedData/Build/Products/Release/Droidective-${GITHUB_REF_NAME}.dmg"
          URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/Droidective-${GITHUB_REF_NAME}.dmg"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/Rohindh-R/homebrew-tap.git" tap
          ./scripts/update-cask.sh "$VERSION" "$DMG" "$URL" "tap/Casks/droidective.rb"
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/droidective.rb
          git diff --cached --quiet || git commit -m "droidective ${VERSION}"
          git push
