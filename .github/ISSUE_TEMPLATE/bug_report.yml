name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
  - type: input
    id: version
    attributes:
      label: Droidective version
      description: Shown in About & Feedback inside the app.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: macOS version & device
      description: e.g. macOS 14.5 · Pixel 7 (Android 14)
